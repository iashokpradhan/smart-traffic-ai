<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Traffic AI Core</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #080a11;
  --panel-bg: rgba(20, 24, 40, 0.4);
  --panel-border: rgba(255, 255, 255, 0.06);
  --primary: #4F46E5;
  --primary-glow: rgba(79, 70, 229, 0.5);
  --cyan: #06b6d4;
  --cyan-glow: rgba(6, 182, 212, 0.4);
  --green: #10b981;
  --yellow: #f59e0b;
  --red: #ef4444;
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --blur: blur(16px);
}

* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg-dark);
  color: var(--text-main);
  font-family: 'Outfit', sans-serif;
  overflow-x: hidden;
  background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, transparent 50%),
                    radial-gradient(circle at 100% 100%, #0f172a 0%, transparent 50%);
  background-attachment: fixed;
}

header {
  padding: 20px 40px;
  background: rgba(8, 10, 17, 0.6);
  backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--panel-border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo-wrapper { display: flex; align-items: center; gap: 15px; }
.logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--cyan), var(--primary)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; box-shadow: 0 0 20px var(--primary-glow); }
.logo-title { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: 1px; background: linear-gradient(to right, #fff, var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.logo-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }

.status-badge {
  display: flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
  background: rgba(16, 185, 129, 0.1); color: var(--green); padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(16, 185, 129, 0.2);
}
.status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

main {
  max-width: 1500px;
  margin: 0 auto;
  padding: 40px;
  display: grid;
  grid-template-columns: 2.5fr 1.2fr;
  gap: 30px;
}

.glass-panel {
  background: var(--panel-bg);
  backdrop-filter: var(--blur);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.panel-title {
  font-size: 16px; font-weight: 600; color: var(--text-main); margin: 0 0 20px 0; display: flex; align-items: center; gap: 10px;
}
.panel-title i { color: var(--cyan); }

/* Grid */
.grid-system { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
.node-card {
  background: rgba(255,255,255,0.02); border: 1px solid var(--panel-border); border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.3s;
  position: relative; overflow: hidden;
}
.node-card:hover { background: rgba(255,255,255,0.04); transform: translateY(-2px); border-color: var(--cyan); }
.node-card.glow-red { border-color: rgba(239, 68, 68, 0.5); box-shadow: 0 0 20px rgba(239, 68, 68, 0.15); }
.node-card.glow-yellow { border-color: rgba(245, 158, 11, 0.4); box-shadow: 0 0 20px rgba(245, 158, 11, 0.1); }
.node-card.glow-green { border-color: rgba(16, 185, 129, 0.3); }

.node-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
.n-id { font-size: 24px; font-weight: 700; }
.n-loc { font-size: 13px; color: var(--text-muted); }
.n-badge { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 4px 10px; border-radius: 12px; font-weight: bold; }
.badge-low { background: rgba(16,185,129,0.1); color: var(--green); }
.badge-med { background: rgba(245,158,11,0.1); color: var(--yellow); }
.badge-high { background: rgba(239,68,68,0.1); color: var(--red); }

.n-stats { display: flex; justify-content: space-between; align-items: flex-end; }
.stat-group { display: flex; gap: 20px; }
.stat-box { display: flex; flex-direction: column; }
.s-lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.s-val { font-size: 20px; font-family: 'JetBrains Mono', monospace; font-weight: 700; }

.traffic-light { display: flex; gap: 8px; background: rgba(0,0,0,0.4); padding: 6px 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
.light { width: 14px; height: 14px; border-radius: 50%; background: #1e293b; transition: 0.3s; }
.light.red.active { background: var(--red); box-shadow: 0 0 12px var(--red); }
.light.yellow.active { background: var(--yellow); box-shadow: 0 0 12px var(--yellow); }
.light.green.active { background: var(--green); box-shadow: 0 0 12px var(--green); }

.ai-alert { 
  position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
  background: rgba(239, 68, 68, 0.9); color: #fff; padding: 4px 12px; border-radius: 20px; 
  font-size: 11px; font-weight: bold; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.5);
  display: flex; align-items: center; gap: 6px; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn { 0% {transform: translate(-50%, -10px) scale(0.8); opacity: 0;} 100% {transform: translate(-50%, 0) scale(1); opacity: 1;} }

/* Map */
.viz-box {
  width: 100%; aspect-ratio: 1; background: #0b0f19; border-radius: 16px; border: 1px solid var(--panel-border);
  position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
}
.road-v { position: absolute; width: 80px; height: 100%; background: #161e30; left: 50%; transform: translateX(-50%); border-left: 2px dashed #2a364f; border-right: 2px dashed #2a364f; }
.road-h { position: absolute; height: 80px; width: 100%; background: #161e30; top: 50%; transform: translateY(-50%); border-top: 2px dashed #2a364f; border-bottom: 2px dashed #2a364f; }
.viz-center { position: absolute; width: 76px; height: 76px; background: #1e293b; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(6, 182, 212, 0.2); border: 1px solid var(--cyan); }
.viz-center-id { font-size: 18px; font-weight: 700; color: var(--cyan); }
.car { position: absolute; width: 8px; height: 14px; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.5); transition: top 0.3s linear, left 0.3s linear; }

/* AI Upload */
.ai-upload-area {
  border: 2px dashed rgba(6, 182, 212, 0.3); background: rgba(6, 182, 212, 0.02); border-radius: 16px; height: 180px;
  display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; position: relative; overflow: hidden; transition: 0.3s;
}
.ai-upload-area:hover { border-color: var(--cyan); background: rgba(6, 182, 212, 0.08); }
.ai-icon { font-size: 32px; margin-bottom: 10px; background: linear-gradient(135deg, var(--cyan), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.ai-text { font-size: 14px; font-weight: 600; color: var(--text-main); }
.ai-sub { font-size: 12px; color: var(--text-muted); margin-top: 5px; }

#preview-container { display: none; width: 100%; height: 100%; position: absolute; top:0; left:0; }
#preview-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
.ai-scanner { position: absolute; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(8, 10, 17, 0.6); z-index: 10; }
.scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--cyan); box-shadow: 0 0 20px 2px var(--cyan); animation: scan 1.5s ease-in-out infinite alternate; }
@keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
.ai-processing-text { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--cyan); letter-spacing: 2px; font-weight: bold; margin-top: 20px; }
.spinner { width: 30px; height: 30px; border: 3px solid rgba(6,182,212,0.2); border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

select.custom-select {
  width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border);
  border-radius: 12px; color: #fff; font-family: 'Outfit', sans-serif; font-size: 14px; outline: none; margin-bottom: 16px;
  appearance: none;
}
select.custom-select:focus { border-color: var(--cyan); }

.btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 14px;
  cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary { background: linear-gradient(135deg, var(--cyan), var(--primary)); color: #fff; box-shadow: 0 4px 15px var(--primary-glow); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--primary-glow); }

/* Terminal */
.terminal {
  background: #05070a; border: 1px solid var(--panel-border); border-radius: 16px; padding: 20px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #a5b4fc; height: 220px; overflow-y: auto;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
}
.term-line { margin-bottom: 6px; line-height: 1.5; }
.term-time { color: var(--text-muted); margin-right: 8px; }
.term-warn { color: var(--yellow); }
.term-err { color: var(--red); }
.term-succ { color: var(--green); }
.term-highlight { color: var(--cyan); }

/* Responsive Design */
@media (max-width: 1024px) {
  main { grid-template-columns: 1fr; }
  .grid-system { grid-template-columns: repeat(2, 1fr); }
  .terminal { height: 250px; }
}

@media (max-width: 768px) {
  header { flex-direction: column; gap: 15px; text-align: center; padding: 15px 20px; }
  .logo-wrapper { justify-content: center; }
  .grid-system { grid-template-columns: 1fr; }
  main { padding: 20px; }
  .node-header { flex-direction: column; gap: 10px; align-items: flex-start; }
  .n-stats { flex-direction: column; align-items: flex-start; gap: 15px; }
}

@media (max-width: 480px) {
  .logo-title { font-size: 18px; }
  .status-badge { font-size: 10px; padding: 6px 12px; }
  .panel-title { font-size: 14px; }
  .ai-upload-area { height: 140px; }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>

<header>
  <div class="logo-wrapper">
    <div class="logo-icon">AI</div>
    <div>
      <h1 class="logo-title">NeuroTraffic Core</h1>
      <div class="logo-sub">Predictive Grid Management Engine</div>
    </div>
  </div>
  <div class="status-badge">
    <div class="status-dot"></div>
    STOMP TELEMETRY LINKED
  </div>
</header>

<main>
  <!-- Left Side: Grid & Logs -->
  <div style="display: flex; flex-direction: column; gap: 30px;">
    <div class="glass-panel">
       <h2 class="panel-title">LIVE INTERSECTION MATRIX</h2>
       <div class="grid-system" id="grid-container"></div>
    </div>
    
    <div class="glass-panel" style="padding: 0; overflow: hidden;">
      <div style="padding: 15px 20px; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--panel-border); display:flex; justify-content:space-between; align-items:center;">
         <h2 class="panel-title" style="margin:0;">SYSTEM TERMINAL</h2>
         <span style="font-size: 10px; color:var(--green); font-family: 'JetBrains Mono';">● REC</span>
      </div>
      <div class="terminal" id="terminal-out" style="border-radius: 0 0 16px 16px; border:none; height:180px;">
         <div class="term-line"><span class="term-time">[SYS]</span> Initializing Deep Learning Models...</div>
      </div>
    </div>
  </div>

  <!-- Right Side: Viz & AI -->
  <div style="display: flex; flex-direction: column; gap: 30px;">
    
    <!-- AI Upload -->
    <div class="glass-panel" style="position: relative; z-index: 20;">
      <h2 class="panel-title">VISION ENGINE (GEMINI 2.5)</h2>
      
      <select class="custom-select" id="ul-id">
        <option value="A1">A1 — Main St & 1st Ave</option>
        <option value="A2">A2 — Main St & 2nd Ave</option>
        <option value="B1">B1 — Oak Rd & 1st Ave</option>
        <option value="B2">B2 — Oak Rd & 2nd Ave</option>
        <option value="C1">C1 — Park Blvd & 1st Ave</option>
        <option value="C2">C2 — Park Blvd & 2nd Ave</option>
      </select>

      <div class="ai-upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
         <div id="ul-def" style="text-align:center;">
            <div class="ai-icon">⚲</div>
            <div class="ai-text">Drop Camera Feed Here</div>
            <div class="ai-sub">Supports JPG, PNG (Max 5MB)</div>
         </div>
         <div id="preview-container">
            <img id="preview-img" src="" alt="">
            <div class="scan-line"></div>
            <div class="ai-scanner" id="ai-scanner">
               <div class="spinner"></div>
               <div class="ai-processing-text">ANALYZING SCENE...</div>
            </div>
         </div>
         <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
      </div>
      
      <button class="btn btn-primary" style="margin-top:20px;" onclick="doUpload()">
        ✨ PROCESS WITH AI
      </button>
    </div>

    <!-- Live Map -->
    <div class="glass-panel">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2 class="panel-title" style="margin:0;">TACTICAL MAP</h2>
        <span style="font-size:12px; color:var(--text-muted); background:rgba(0,0,0,0.3); padding:4px 10px; border-radius:12px;" id="viz-label">NODE A1</span>
      </div>
      <div class="viz-box" id="viz-box">
         <div class="road-v"></div>
         <div class="road-h"></div>
         <div class="viz-center"><div class="viz-center-id" id="viz-center-id">A1</div></div>
         <div id="cars-layer"></div>
      </div>
    </div>

  </div>
</main>

<script>
// Data Store
const meta = { A1: 'Main & 1st', A2: 'Main & 2nd', B1: 'Oak & 1st', B2: 'Oak & 2nd', C1: 'Park & 1st', C2: 'Park & 2nd' };
let state = {};
Object.keys(meta).forEach(id => {
  state[id] = { id, vehicles: 0, density: 'LOW', phase: 'GREEN', timing: 30, hasEmergency: false, hasAccident: false };
});

let selectedVizNode = 'A1';
let cars = [];

function termLog(msg, type='info') {
  const t = document.getElementById('terminal-out');
  const div = document.createElement('div');
  div.className = 'term-line';
  const time = new Date().toISOString().split('T')[1].slice(0,12);
  let colorClass = '';
  if(type === 'err') colorClass = 'term-err';
  if(type === 'succ') colorClass = 'term-succ';
  if(type === 'warn') colorClass = 'term-warn';
  if(type === 'highlight') colorClass = 'term-highlight';
  
  div.innerHTML = `<span class="term-time">[${time}]</span> <span class="${colorClass}">${msg}</span>`;
  t.appendChild(div);
  t.scrollTop = t.scrollHeight;
  if(t.childElementCount > 50) t.firstChild.remove();
}

function getGlowClass(ic) {
  if (ic.hasEmergency || ic.hasAccident || ic.density === 'HIGH') return 'glow-red';
  if (ic.density === 'MEDIUM') return 'glow-yellow';
  return 'glow-green';
}

function getBadge(ic) {
  if (ic.hasEmergency) return '<span class="n-badge badge-high">EMERGENCY OVERRIDE</span>';
  if (ic.hasAccident) return '<span class="n-badge badge-high">ACCIDENT DETECTED</span>';
  if (ic.density === 'HIGH') return '<span class="n-badge badge-high">HEAVY TRAFFIC</span>';
  if (ic.density === 'MEDIUM') return '<span class="n-badge badge-med">MODERATE FLOW</span>';
  return '<span class="n-badge badge-low">CLEAR PATH</span>';
}

function getAlert(ic) {
  if (ic.hasEmergency) return '<div class="ai-alert">🚑 AMBULANCE DETECTED</div>';
  if (ic.hasAccident) return '<div class="ai-alert">💥 CRASH DETECTED</div>';
  return '';
}

function renderGrid() {
  const grid = document.getElementById('grid-container');
  grid.innerHTML = Object.values(state).map(ic => {
    const r = ic.phase === 'RED' ? 'active' : '';
    const y = ic.phase === 'YELLOW' ? 'active' : '';
    const g = ic.phase === 'GREEN' ? 'active' : '';

    return `
    <div class="node-card ${getGlowClass(ic)}" onclick="setVizNode('${ic.id}')">
       ${getAlert(ic)}
       <div class="node-header">
          <div>
            <div class="n-id">${ic.id}</div>
            <div class="n-loc">${meta[ic.id]}</div>
          </div>
          ${getBadge(ic)}
       </div>
       <div class="n-stats">
          <div class="stat-group">
             <div class="stat-box"><span class="s-lbl">COUNT</span><span class="s-val">${ic.vehicles}</span></div>
             <div class="stat-box"><span class="s-lbl">TIMER</span><span class="s-val">${ic.timing}s</span></div>
          </div>
          <div class="traffic-light">
             <div class="light red ${r}"></div>
             <div class="light yellow ${y}"></div>
             <div class="light green ${g}"></div>
          </div>
       </div>
    </div>
    `;
  }).join('');
}

function setVizNode(id) {
  selectedVizNode = id;
  document.getElementById('viz-label').textContent = 'NODE ' + id;
  document.getElementById('viz-center-id').textContent = id;
  termLog(`Tactical Map switched to Node ${id}`, 'highlight');
  cars = []; // Clear cars on switch
}

// Map Animation
function spawnCar() {
  const dir = Math.random() > 0.5 ? 'H' : 'V';
  // If moving horizontally, rotate 90deg
  const rot = dir === 'H' ? 'transform: rotate(90deg);' : '';
  const car = { id: Math.random(), dir, pos: -10, speed: Math.random()*1.5 + 0.5, rot };
  cars.push(car);
}

function updateMap() {
  const ic = state[selectedVizNode];
  if(!ic) return;
  
  cars.forEach(c => {
    let stopping = false;
    // Simple stop logic at center (40-45%) if Red light
    if (ic.phase === 'RED' && c.pos > 35 && c.pos < 42) stopping = true;
    if (!stopping) c.pos += c.speed;
  });
  
  cars = cars.filter(c => c.pos < 110);
  
  // Spawn rate based on density
  let spawnChance = ic.density === 'HIGH' ? 0.08 : ic.density === 'MEDIUM' ? 0.04 : 0.01;
  if(Math.random() < spawnChance && cars.length < 15) spawnCar();
  
  const layer = document.getElementById('cars-layer');
  layer.innerHTML = cars.map(c => {
    const col = c.dir === 'H' ? 'var(--cyan)' : '#fff';
    const x = c.dir === 'H' ? c.pos + '%' : 'calc(50% + 15px)';
    const y = c.dir === 'V' ? c.pos + '%' : 'calc(50% - 20px)';
    return `<div class="car" style="background:${col}; left:${x}; top:${y}; ${c.rot}"></div>`;
  }).join('');
  
  requestAnimationFrame(updateMap);
}

// AI Upload Flow
function handleFileSelect(e) {
  const f = e.target.files[0];
  if(f) {
    const reader = new FileReader();
    reader.onload = function(evt) {
      document.getElementById('ul-def').style.display = 'none';
      const container = document.getElementById('preview-container');
      container.style.display = 'block';
      document.getElementById('preview-img').src = evt.target.result;
    }
    reader.readAsDataURL(f);
    termLog(`Feed frame loaded into buffer: ${f.name}`);
  }
}

async function doUpload() {
  const fileInput = document.getElementById('file-input');
  if(!fileInput.files[0]) {
    termLog('Err: No camera feed selected for AI analysis.', 'err');
    return;
  }
  const id = document.getElementById('ul-id').value;
  document.getElementById('ai-scanner').style.display = 'flex';
  termLog(`Transmitting visual data to Gemini Vision Engine for Node ${id}...`, 'highlight');
  
  const formData = new FormData();
  formData.append('file', fileInput.files[0]);
  formData.append('intersectionId', id);

  try {
    const resp = await fetch('/upload', { method: 'POST', body: formData });
    if(!resp.ok) throw new Error('API Reject: ' + resp.status);
    const result = await resp.json();
    const data = result.data;
    
    termLog(`AI Success: Detected ${data.vehicleCount} vehicles. Density: ${data.density}`, 'succ');
    if(data.hasEmergency) termLog(`🚨 AI ALERT: Emergency vehicle detected at ${id}! Triggering override.`, 'err');
    if(data.hasAccident) termLog(`💥 AI ALERT: Collision detected at ${id}! Adjusting flow.`, 'warn');
    
  } catch(err) {
    termLog(`Vision Engine Error: ${err.message}`, 'err');
    termLog(`Using local fallback heuristics for Node ${id}`, 'warn');
    state[id].vehicles = Math.floor(Math.random()*50)+10;
    state[id].density = state[id].vehicles > 40 ? 'HIGH' : state[id].vehicles > 20 ? 'MEDIUM' : 'LOW';
    state[id].hasEmergency = Math.random() > 0.8;
    state[id].hasAccident = Math.random() > 0.9;
    renderGrid();
  }
  
  document.getElementById('ai-scanner').style.display = 'none';
  document.getElementById('ul-def').style.display = 'flex';
  document.getElementById('preview-container').style.display = 'none';
  fileInput.value = '';
}

// Websocket
let stompClient = null;
function connectSTOMP() {
  const stompSocket = new SockJS('/ws-traffic');
  stompClient = Stomp.over(stompSocket);
  stompClient.debug = null; 

  stompClient.connect({}, frame => {
    termLog(`Telemetry Link Active.`, 'succ');
    stompClient.subscribe('/topic/traffic', msg => {
      const parsed = JSON.parse(msg.body);
      if(parsed) {
        const dataArr = Array.isArray(parsed) ? parsed : Object.values(parsed);
        dataArr.forEach(ic => {
          const id = ic.id || ic.intersectionId;
          if(state[id]) {
            state[id].vehicles = ic.vehicleCount;
            state[id].density = ic.density;
            state[id].timing = ic.signalTiming;
            state[id].hasEmergency = ic.hasEmergency || false;
            state[id].hasAccident = ic.hasAccident || false;
            
            if(state[id].hasEmergency || state[id].hasAccident) {
              state[id].phase = 'GREEN'; // Give them the green light!
            } else {
              state[id].phase = ['RED', 'YELLOW', 'GREEN'][Math.floor(Math.random() * 3)];
            }
          }
        });
        renderGrid();
      }
    });
  }, err => {
    termLog('Telemetry Link Lost! Retrying...', 'err');
    setTimeout(connectSTOMP, 5000);
  });
}

renderGrid();
updateMap();
connectSTOMP();
</script>
</body>
</html>
