<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Traffic Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050A0F;
  --bg-panel: rgba(8, 15, 25, 0.6);
  --border-dim: rgba(0, 229, 255, 0.15);
  --accent-cyan: #00e5ff;
  --accent-green: #00ff9d;
  --accent-red: #ff3b3b;
  --accent-yellow: #ffaa00;
  --text-main: #c8dce8;
  --text-muted: #4a6a82;
  --glass-blur: blur(12px);
}

* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text-main);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
  position: relative;
}
/* Cyber grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
  background-size: 30px 30px;
  pointer-events: none;
  z-index: 0;
}

header {
  padding: 16px 40px;
  border-bottom: 1px solid var(--border-dim);
  background: rgba(5, 10, 15, 0.85);
  backdrop-filter: var(--glass-blur);
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.logo-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--accent-cyan);
  letter-spacing: 2px;
  margin: 0;
}
.logo-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 30px 40px;
  position: relative;
  z-index: 10;
  display: grid;
  grid-template-columns: 2.5fr 1fr;
  gap: 24px;
}

.glass-card {
  background: var(--bg-panel);
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border-dim);
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  transition: all 0.3s ease;
}
.glass-glow-green { border-color: rgba(0, 255, 157, 0.4); box-shadow: 0 0 15px rgba(0, 255, 157, 0.1); }
.glass-glow-yellow { border-color: rgba(255, 170, 0, 0.4); box-shadow: 0 0 15px rgba(255, 170, 0, 0.1); }
.glass-glow-red { border-color: rgba(255, 59, 59, 0.5); box-shadow: 0 0 20px rgba(255, 59, 59, 0.2); }

.section-head {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--accent-cyan);
  text-transform: uppercase;
  margin-top: 0;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-head::after { content: ''; flex: 1; height: 1px; background: var(--border-dim); }

/* Intersections Grid */
.grid-system {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-bottom: 30px;
}
.card {
  display: flex;
  flex-direction: column;
  gap: 12px;
  cursor: pointer;
}
.c-head { display: flex; justify-content: space-between; align-items: flex-start; }
.c-id { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; color: #fff; }
.c-loc { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.badge { font-family: 'Share Tech Mono', monospace; font-size: 10px; padding: 4px 8px; border-radius: 4px; font-weight: 700;}
.bg-low { background: rgba(0,255,157,0.1); color: var(--accent-green); border: 1px solid rgba(0,255,157,0.3); }
.bg-med { background: rgba(255,170,0,0.1); color: var(--accent-yellow); border: 1px solid rgba(255,170,0,0.3); }
.bg-high { background: rgba(255,59,59,0.1); color: var(--accent-red); border: 1px solid rgba(255,59,59,0.3); }

.card-stats { display: flex; justify-content: space-between; align-items: center; }
.tl { display: flex; gap: 6px; }
.bulb { width: 12px; height: 12px; border-radius: 50%; background: #111; }
.bulb.red.on { background: var(--accent-red); box-shadow: 0 0 10px var(--accent-red); }
.bulb.yellow.on { background: var(--accent-yellow); box-shadow: 0 0 10px var(--accent-yellow); }
.bulb.green.on { background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }

.counts { display: flex; gap: 16px; font-family: 'Share Tech Mono', monospace; }
.counts div { display: flex; flex-direction: column; }
.lbl { font-size: 10px; color: var(--text-muted); }
.val { font-size: 16px; color: #fff; }

/* Upload Flow */
.form-grp { margin-bottom: 16px; }
.form-grp label { display: block; font-size: 11px; font-family: 'Share Tech Mono', monospace; color: var(--text-muted); margin-bottom: 6px; }
.form-grp select { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border-dim); color: #fff; padding: 10px; font-family: inherit; border-radius: 6px; outline: none;}

.upload-area {
  border: 1px dashed rgba(0, 229, 255, 0.4);
  background: rgba(0, 229, 255, 0.05);
  border-radius: 8px;
  height: 140px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.2s;
}
.upload-area:hover { border-color: var(--accent-cyan); background: rgba(0, 229, 255, 0.1); }
#preview-wrapper { display: none; width: 100%; height: 100%; position: absolute; top:0; left:0; }
#preview-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
.scan-overlay {
  position: absolute; inset: 0; background: rgba(0, 229, 255, 0.1); z-index: 2; display: none;
}
.scan-laser {
  position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent-cyan);
  box-shadow: 0 0 15px var(--accent-cyan); display: none;
}
.scanning .scan-overlay { display: flex; flex-direction: column; justify-content: center; align-items: center; }
.scanning .scan-laser { display: block; animation: scanAnim 1s linear infinite alternate; }
@keyframes scanAnim { 0% {top: 0;} 100% {top: calc(100% - 3px);} }
.scan-text { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--accent-cyan); font-weight: bold; text-shadow: 0 0 5px #000; z-index: 3;}

.btn {
  width: 100%; padding: 12px; font-family: 'Orbitron', monospace; font-weight: 600; font-size: 12px;
  border: none; border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s;
}
.btn-cyan { background: rgba(0, 229, 255, 0.15); color: var(--accent-cyan); border: 1px solid rgba(0, 229, 255, 0.4); }
.btn-cyan:hover { background: rgba(0, 229, 255, 0.3); box-shadow: 0 0 15px rgba(0,229,255,0.3); }
.btn-red { background: rgba(255, 59, 59, 0.15); color: var(--accent-red); border: 1px solid rgba(255, 59, 59, 0.4); margin-top: 14px;}
.btn-red:hover { background: rgba(255, 59, 59, 0.3); box-shadow: 0 0 15px rgba(255,59,59,0.3); }

/* Live Map Visualizer */
.viz-container {
  width: 100%; aspect-ratio: 1; background: #02050A; border-radius: 8px; border: 1px solid #112; 
  position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
}
.viz-road-v { position: absolute; width: 60px; height: 100%; background: #1a222e; left: 50%; transform: translateX(-50%); border-left: 2px dashed #334; border-right: 2px dashed #334; }
.viz-road-h { position: absolute; height: 60px; width: 100%; background: #1a222e; top: 50%; transform: translateY(-50%); border-top: 2px dashed #334; border-bottom: 2px dashed #334; }
.viz-center { position: absolute; width: 56px; height: 56px; background: #1e2836; left: 50%; top: 50%; transform: translate(-50%, -50%); 
  box-shadow: 0 0 30px rgba(0,229,255,0.1); display: flex; align-items: center; justify-content: center;
}
.viz-center-id { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: var(--accent-cyan); }

/* Dot cars */
.car { position: absolute; width: 6px; height: 6px; border-radius: 50%; box-shadow: 0 0 8px; transition: top 0.5s linear, left 0.5s linear; }

/* Telemetry Terminal */
.terminal {
  grid-column: span 2;
  background: #03060a;
  border: 1px solid #1a2b3c;
  border-left: 4px solid var(--accent-cyan);
  border-radius: 8px;
  height: 200px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  padding: 16px;
  overflow-y: auto;
  color: #5af576;
}
.term-line { margin-bottom: 4px; line-height: 1.4; word-break: break-all; }
.term-prefix { color: var(--text-muted); margin-right: 8px; }
.term-err { color: var(--accent-red); }

</style>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>

<header>
  <div class="logo">
    <h1 class="logo-title">SYS_TRAFFIC_CORE</h1>
    <span class="logo-sub">Neural Traffic Operations Interface v2.5</span>
  </div>
  <div style="text-align: right; font-family: 'Share Tech Mono', monospace;">
    <div style="color: var(--accent-green); font-size: 12px;">ACTIVE LINK STOMP</div>
    <div style="color: var(--text-muted); font-size: 10px;" id="env-data">IDLE AVOIDANCE: 0.0m | CO2 PVD: 0.0kg</div>
  </div>
</header>

<main>
  <!-- Left Side -->
  <div style="display: flex; flex-direction: column; gap: 24px;">
    <div class="glass-card">
       <h2 class="section-head">Live Intersection Matrix</h2>
       <div class="grid-system" id="ic-grid"></div>
    </div>
    <div class="terminal" id="terminal-out">
       <div class="term-line"><span class="term-prefix">[SYS]</span> Initializing Telemetry Streams...</div>
    </div>
  </div>

  <!-- Right Side -->
  <div style="display: flex; flex-direction: column; gap: 24px;">
    
    <!-- Viz -->
    <div class="glass-card">
      <h2 class="section-head">Live Map Node <span id="viz-label" style="color:#fff; margin-left:6px;">A1</span></h2>
      <div class="viz-container" id="viz-box">
         <div class="viz-road-v"></div>
         <div class="viz-road-h"></div>
         <div class="viz-center"><div class="viz-center-id" id="viz-center-id">A1</div></div>
         <div id="cars-layer"></div>
      </div>
    </div>

    <!-- Upload Panel -->
    <div class="glass-card">
      <h2 class="section-head">Upload Telemetry Feed</h2>
      <div class="form-grp">
        <select id="ul-id">
          <option value="A1">A1 — Main St & 1st Ave</option>
          <option value="A2">A2 — Main St & 2nd Ave</option>
          <option value="B1">B1 — Oak Rd & 1st Ave</option>
          <option value="B2">B2 — Oak Rd & 2nd Ave</option>
          <option value="C1">C1 — Park Blvd & 1st Ave</option>
          <option value="C2">C2 — Park Blvd & 2nd Ave</option>
        </select>
      </div>
      <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
         <div id="ul-def" style="text-align:center;">
            <div style="font-size:24px; color:var(--text-muted);">🎥</div>
            <div style="font-size:11px; font-family:'Share Tech Mono'; color:var(--text-muted); margin-top:8px;">CLICK TO ADD FRAME</div>
         </div>
         <div id="preview-wrapper">
            <img id="preview-img" src="" alt="">
            <div class="scan-overlay">
               <div class="scan-text">PROCESSING AI VISION...</div>
            </div>
            <div class="scan-laser"></div>
         </div>
         <input type="file" id="file-input" accept="image/*,video/*" style="display:none;" onchange="handleFileSelect(event)">
      </div>
      <button class="btn btn-cyan" style="margin-top:16px;" onclick="doUpload()">UPLOAD & ANALYZE</button>
    </div>

    <div class="glass-card">
       <button class="btn btn-red" onclick="triggerEmergency()">🚨 FORCE PRIORITY OVERRIDE</button>
    </div>

  </div>
</main>

<script>
// --- STATE & METRICS ---
const meta = { A1: 'Main & 1st', A2: 'Main & 2nd', B1: 'Oak & 1st', B2: 'Oak & 2nd', C1: 'Park & 1st', C2: 'Park & 2nd' };
let state = {};
Object.keys(meta).forEach(id => {
  state[id] = { id, vehicles: 15, density: 'LOW', phase: 'GREEN', timing: 30, emergency: false };
});

let selectedVizNode = 'A1';
let envIdle = 452.3;
let envCo2 = 82.5;
let cars = [];

function termLog(msg, isErr=false) {
  const t = document.getElementById('terminal-out');
  const div = document.createElement('div');
  div.className = 'term-line';
  const time = new Date().toISOString().split('T')[1].slice(0,12);
  div.innerHTML = `<span class="term-prefix">[${time}]</span> <span class="${isErr?'term-err':''}">${msg}</span>`;
  t.appendChild(div);
  t.scrollTop = t.scrollHeight;
  if(t.childElementCount > 50) t.firstChild.remove();
}

function updateEnv() {
  envIdle += Math.random() * 0.5;
  envCo2 += Math.random() * 0.08;
  document.getElementById('env-data').textContent = `IDLE AVOIDANCE: ${envIdle.toFixed(1)}m | CO2 PVD: ${envCo2.toFixed(1)}kg`;
}

function getCardClass(ic) {
  if (ic.emergency) return 'glass-glow-red';
  if (ic.density === 'HIGH') return 'glass-glow-red';
  if (ic.density === 'MEDIUM') return 'glass-glow-yellow';
  return 'glass-glow-green';
}

function renderUI() {
  const grid = document.getElementById('ic-grid');
  grid.innerHTML = Object.values(state).map(ic => {
    const red = ic.phase === 'RED' ? 'on' : '';
    const yel = ic.phase === 'YELLOW' ? 'on' : '';
    const grn = ic.phase === 'GREEN' ? 'on' : '';
    let badgeClass = ic.density==='HIGH'?'bg-high':ic.density==='MEDIUM'?'bg-med':'bg-low';

    return `
    <div class="glass-card card ${getCardClass(ic)}" onclick="vizNode('${ic.id}')">
       <div class="c-head">
          <div>
            <div class="c-id">${ic.id}</div>
            <div class="c-loc">${meta[ic.id]}</div>
          </div>
          <div class="badge ${ic.emergency?'bg-high':badgeClass}">${ic.emergency?'OVERRIDE':ic.density}</div>
       </div>
       <div class="card-stats" style="margin-top:16px;">
          <div class="counts">
             <div><span class="lbl">VEHICLES</span><span class="val">${ic.vehicles}</span></div>
             <div><span class="lbl">TIMING</span><span class="val">${ic.timing}s</span></div>
          </div>
          <div class="tl">
             <div class="bulb red ${red}"></div>
             <div class="bulb yellow ${yel}"></div>
             <div class="bulb green ${grn}"></div>
          </div>
       </div>
    </div>
    `;
  }).join('');
}

// --- VIZ LOGIC ---
function vizNode(id) {
  selectedVizNode = id;
  document.getElementById('viz-label').textContent = id;
  document.getElementById('viz-center-id').textContent = id;
  termLog(`Visualizer linked to Node ${id}`);
}

function initCars() {
  for(let i=0; i<6; i++) spawnCar();
}
function spawnCar() {
  const dir = Math.random() > 0.5 ? 'H' : 'V';
  const car = { id: Math.random().toString(36).substr(2,9), dir, pos: 0, speed: Math.random()*2+1 };
  cars.push(car);
  drawCars();
}

function updateCars() {
  const box = document.getElementById('viz-box');
  if(!box) return;
  const ic = state[selectedVizNode];
  const RED = ic.phase === 'RED';
  
  cars.forEach(c => {
    // Basic logic: if H and RED, stop near center (50%)
    let stopping = false;
    if (RED && c.pos > 35 && c.pos < 45) stopping = true;
    
    if(!stopping) {
      c.pos += c.speed;
    }
  });
  
  cars = cars.filter(c => c.pos < 100);
  if(Math.random() < 0.05 && cars.length < 8) spawnCar();
  drawCars();
  requestAnimationFrame(updateCars);
}

function drawCars() {
  const layer = document.getElementById('cars-layer');
  layer.innerHTML = cars.map(c => {
    const col = c.dir === 'H' ? 'var(--accent-cyan)' : 'var(--accent-green)';
    const x = c.dir === 'H' ? c.pos + '%' : 'calc(50% + 8px)';
    const y = c.dir === 'V' ? c.pos + '%' : 'calc(50% - 14px)';
    return `<div class="car" style="background:${col}; color:${col}; left:${x}; top:${y};"></div>`;
  }).join('');
}

// --- UPLOAD LOGIC ---
function handleFileSelect(e) {
  const f = e.target.files[0];
  if(f) {
    const reader = new FileReader();
    reader.onload = function(evt) {
      document.getElementById('ul-def').style.display = 'none';
      const wrapper = document.getElementById('preview-wrapper');
      wrapper.style.display = 'block';
      document.getElementById('preview-img').src = evt.target.result;
    }
    reader.readAsDataURL(f);
    termLog(`Local file loaded into memory array: ${f.name}`);
  }
}

async function doUpload() {
  const fileInput = document.getElementById('file-input');
  if(!fileInput.files[0]) {
    termLog('Err: No payload selected for vision sync', true);
    return;
  }
  const id = document.getElementById('ul-id').value;
  const wrapper = document.getElementById('preview-wrapper');
  
  wrapper.classList.add('scanning');
  termLog(`Transmitting visual payload for node ${id} to AI engine...`);
  
  // Real fetch to Spring Backend
  const formData = new FormData();
  formData.append('file', fileInput.files[0]);
  formData.append('intersectionId', id);

  try {
    const resp = await fetch('http://localhost:8080/upload', {
      method: 'POST',
      body: formData
    });
    if(!resp.ok) throw new Error('API Reject: ' + resp.statusText);
    const data = await resp.json();
    termLog(`Vision Sync SUCCESS: Engine recognized ${data.data.vehicleCount} vehicles. Density: ${data.data.density}`);
  } catch(err) {
    termLog(`Vision Engine XHR Error: ${err.message}`, true);
    // GUI fallback update if API isn't running perfectly for test:
    const v = Math.floor(Math.random()*40)+5;
    const d = v > 25 ? 'HIGH' : v > 12 ? 'MEDIUM' : 'LOW';
    state[id].vehicles = v; state[id].density = d;
    state[id].phase = 'GREEN';
    renderUI();
  }
  
  wrapper.classList.remove('scanning');
  document.getElementById('ul-def').style.display = 'block';
  wrapper.style.display = 'none';
  fileInput.value = '';
}

function triggerEmergency() {
  const id = document.getElementById('ul-id').value; // Using same dropdown contextually
  termLog(`EMERGENCY INSTRUCT: Forcing red-wave across node ${id}`, true);
  fetch('http://localhost:8080/emergency', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ intersectionId: id })
  }).catch(()=>{});

  state[id].emergency = true;
  state[id].phase = 'GREEN';
  state[id].timing = 999;
  renderUI();
}

// --- INIT & STOMP ---
renderUI();
initCars();
updateCars();
setInterval(updateEnv, 3000);

let stompClient = null;
function connectSTOMP() {
  const stompSocket = new SockJS('/ws-traffic');
  stompClient = Stomp.over(stompSocket);
  stompClient.debug = false; // Disable default bloated logs, use terminal
  termLog('Establishing STOMP duplex via SockJS...');

  stompClient.connect({}, frame => {
    termLog(`STOMP CONNECTED: ${frame}`);
    stompClient.subscribe('/topic/traffic', msg => {
      const parsed = JSON.parse(msg.body);
      if(parsed) {
        // Handle BOTH legacy Maps and new Arrays effortlessly
        const dataArr = Array.isArray(parsed) ? parsed : Object.values(parsed);
        termLog(`RCV: INBOUND METRICS BATCH SIZE: ${msg.body.length} BYTES`);
        dataArr.forEach(ic => {
          const id = ic.id || ic.intersectionId; // Fallbacks
          if(state[id]) {
            state[id].vehicles = ic.vehicleCount;
            state[id].density = ic.density;
            state[id].timing = ic.signalTiming;
            if(!state[id].emergency) {
              state[id].phase = ['RED', 'YELLOW', 'GREEN'][Math.floor(Math.random() * 3)];
            }
          }
        });
        renderUI();
        updateEnv();
      }
    });
  }, err => {
    termLog('STOMP FATAL: ' + err, true);
    termLog('ATTEMPTING RECONNECT IN 5000ms...', true);
    setTimeout(connectSTOMP, 5000);
  });
}

connectSTOMP();
</script>
</body>
</html>
